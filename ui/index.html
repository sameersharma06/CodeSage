<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CodeSage — Local AI Code Reviewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <!-- Header -->
    <header>
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">CodeSage</span>
        <span class="logo-badge">100% Local</span>
      </div>
      <div class="header-meta">No cloud. No API keys. Your code stays on your machine.</div>
    </header>

    <!-- Input -->
    <section class="input-section">
      <div class="input-wrap">
        <input
          id="repo-url"
          type="text"
          placeholder="https://github.com/user/repo"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="review-btn" onclick="startReview()">Review</button>
      </div>
      <div class="input-hint">Paste any public GitHub repo URL and hit Review</div>
    </section>

    <!-- Status -->
    <div id="status" class="status hidden"></div>

    <!-- Results -->
    <div id="results" class="hidden">

      <!-- Health Banner -->
      <div id="health-banner" class="health-banner">
        <div class="health-left">
          <div id="health-label" class="health-label"></div>
          <div id="health-url" class="health-url"></div>
        </div>
        <div class="health-counts" id="health-counts"></div>
      </div>

      <!-- Issue Counts -->
      <div class="counts-row" id="counts-row"></div>

      <!-- Issues List -->
      <div class="section-title">Findings</div>
      <div id="issues-list"></div>

      <!-- Memory Stats -->
      <div class="section-title" style="margin-top:32px">CodeSage Memory</div>
      <div id="memory-stats" class="memory-box"></div>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
